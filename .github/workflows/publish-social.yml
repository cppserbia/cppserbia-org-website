name: Publish Social Media

on:
  pull_request:
    types: [closed]
    paths:
      - 'events/*.md'
  workflow_dispatch:
    inputs:
      type:
        description: 'Which publish job to run'
        required: true
        type: choice
        options:
          - new-yt
          - announcement
      pr_number:
        description: 'PR number to extract social text from'
        required: true
        type: number
      dry_run:
        description: 'Log payload without sending to Make.com'
        type: boolean
        default: true

jobs:
  new-yt:
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.type == 'new-yt') ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.body, '<!-- SOCIAL_MEDIA_START -->'))
    uses: ./.github/workflows/_publish-social.yml
    with:
      start_marker: '<!-- SOCIAL_MEDIA_START -->'
      end_marker: '<!-- SOCIAL_MEDIA_END -->'
      payload_start_marker: '<!-- SOCIAL_MEDIA_PAYLOAD_START -->'
      payload_end_marker: '<!-- SOCIAL_MEDIA_PAYLOAD_END -->'
      pr_number: ${{ inputs.pr_number || 0 }}
      dry_run: ${{ inputs.dry_run || false }}
      pr_body: ${{ github.event.pull_request.body || '' }}
      is_dispatch: ${{ github.event_name == 'workflow_dispatch' }}
    secrets:
      MAKE_WEBHOOK_URL: ${{ secrets.MAKE_NEW_YT_WEBHOOK_URL }}
      MAKE_API_KEY: ${{ secrets.MAKE_API_KEY }}

  announcement:
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.type == 'announcement') ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.body, '<!-- EVENT_ANNOUNCEMENT_START -->'))
    uses: ./.github/workflows/_publish-social.yml
    with:
      start_marker: '<!-- EVENT_ANNOUNCEMENT_START -->'
      end_marker: '<!-- EVENT_ANNOUNCEMENT_END -->'
      payload_start_marker: '<!-- EVENT_ANNOUNCEMENT_PAYLOAD_START -->'
      payload_end_marker: '<!-- EVENT_ANNOUNCEMENT_PAYLOAD_END -->'
      pr_number: ${{ inputs.pr_number || 0 }}
      dry_run: ${{ inputs.dry_run || false }}
      pr_body: ${{ github.event.pull_request.body || '' }}
      is_dispatch: ${{ github.event_name == 'workflow_dispatch' }}
    secrets:
      MAKE_WEBHOOK_URL: ${{ secrets.MAKE_ANNOUNCEMENT_WEBHOOK_URL }}
      MAKE_API_KEY: ${{ secrets.MAKE_API_KEY }}

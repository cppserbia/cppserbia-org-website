name: Meetup Event Draft

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-draft:
    # Fork PRs cannot use GITHUB_TOKEN to push back; gate to same-repo PRs.
    if: |
      github.event.label.name == 'meetup-event' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Find event file
        id: find-event
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}

          EVENT_FILE=$(gh pr diff "$PR_NUMBER" --name-only \
            | grep '^events/.*\.md$' | grep -v '^events/_' || true)

          if [ -z "$EVENT_FILE" ]; then
            echo "::error::No event files changed in this PR. The 'meetup-event' label requires a PR that touches events/<slug>.md."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          FILE_COUNT=$(echo "$EVENT_FILE" | wc -l | tr -d ' ')
          if [ "$FILE_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly 1 event file, found $FILE_COUNT. Each PR should contain a single event."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Found event file: $EVENT_FILE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "file=$EVENT_FILE" >> "$GITHUB_OUTPUT"

      # Map the event file's frontmatter onto the composite action's inputs.
      # The glue script also reports `already-created` so we can stay idempotent
      # (the action's create-from-json is not).
      - name: Extract Meetup inputs from frontmatter
        id: meta
        run: npx tsx scripts/meetup-pr-event.ts inputs "${{ steps.find-event.outputs.file }}"

      - name: Create Meetup draft event
        id: create
        if: steps.meta.outputs.already-created != 'true'
        uses: cppserbia/coopkit-meetup-action@v1
        with:
          title: ${{ steps.meta.outputs.title }}
          date: ${{ steps.meta.outputs.date }}
          duration: ${{ steps.meta.outputs.duration }}
          venue-key: ${{ steps.meta.outputs.venue-key }}
          description: ${{ steps.meta.outputs.description }}
          image-url: ${{ steps.meta.outputs.image-url }}
          meetup-client-key: ${{ secrets.MEETUP_CLIENT_KEY }}
          meetup-member-id: ${{ secrets.MEETUP_MEMBER_ID }}
          meetup-signing-key-id: ${{ secrets.MEETUP_SIGNING_KEY_ID }}
          meetup-private-key: ${{ secrets.MEETUP_PRIVATE_KEY }}

      # The action doesn't touch the repo, so persist its outputs ourselves.
      - name: Write event URL back to PR
        if: steps.create.outputs.status == 'created'
        env:
          FILE: ${{ steps.find-event.outputs.file }}
        run: |
          set -euo pipefail
          npx tsx scripts/meetup-pr-event.ts writeback "$FILE" \
            --url "${{ steps.create.outputs.event-url }}" \
            --id "${{ steps.create.outputs.event-id }}"
          git config user.name "cppserbia-bot"
          git config user.email "bot@cppserbia.org"
          git add "$FILE"
          git commit -m "chore(meetup): add draft event URL"
          git push

      - name: Comment on PR
        if: steps.create.outputs.status == 'created'
        uses: actions/github-script@v7
        with:
          script: |
            const eventUrl = '${{ steps.create.outputs.event-url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `✅ Created Meetup draft: ${eventUrl}\n\nThe draft is visible to group organizers only. Review and publish it from the Meetup dashboard when ready.`
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `❌ Failed to create Meetup draft. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });

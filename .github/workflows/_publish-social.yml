name: Reusable Publish Social

on:
  workflow_call:
    inputs:
      type:
        description: '"recording" or "announcement"'
        type: string
        required: true
      pr_number:
        description: 'PR number to extract payload from'
        type: number
        required: true
      dry_run:
        description: 'Log payload without sending to Make.com'
        type: boolean
        required: false
        default: false
    secrets:
      MAKE_WEBHOOK_URL:
        required: true
      MAKE_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive markers from type
        id: markers
        run: |
          if [ "${{ inputs.type }}" = "recording" ]; then
            echo "start=<!-- SOCIAL_MEDIA_START -->" >> "$GITHUB_OUTPUT"
            echo "end=<!-- SOCIAL_MEDIA_END -->" >> "$GITHUB_OUTPUT"
          else
            echo "start=<!-- EVENT_ANNOUNCEMENT_START -->" >> "$GITHUB_OUTPUT"
            echo "end=<!-- EVENT_ANNOUNCEMENT_END -->" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get PR body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ inputs.pr_number }} --repo "$GITHUB_REPOSITORY" --json body -q .body > /tmp/pr-body.txt

      - name: Extract payload from PR description
        id: extract
        run: |
          PAYLOAD=$(sed -n '/${{ steps.markers.outputs.start }}/,/${{ steps.markers.outputs.end }}/p' /tmp/pr-body.txt | sed '1d;$d')

          if [ -z "$PAYLOAD" ]; then
            echo "No payload found between markers."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" > /tmp/stored-payload.txt

      - name: Publish to Make.com
        if: steps.extract.outputs.found == 'true'
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_API_KEY: ${{ secrets.MAKE_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npx tsx scripts/social/publish-payload.ts /tmp/stored-payload.txt
